<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoLander — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- Apply saved theme before CSS loads to prevent flash -->
  <script>(function(){try{var s=JSON.parse(localStorage.getItem('todolander_settings')||'{}');document.documentElement.setAttribute('data-theme',s.theme||'dark');}catch(e){}})();</script>
  <link rel="stylesheet" href="css/neumorphism.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">

  <div class="auth-container">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">
        <img src="favicon.svg" alt="TodoLander" width="72" height="72">
      </div>
      <div class="brand-name">Todo<span>Lander</span></div>
      <div class="brand-tagline">Your tasks, beautifully organized.</div>
    </div>

    <!-- Auth Card -->
    <div class="auth-card neu-card" id="authCard">

      <!-- Tab Toggle -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Create Account</button>
      </div>

      <!-- Login Panel -->
      <div class="auth-panel active" id="panelLogin">
        <form id="loginForm" onsubmit="handleLogin(event)" novalidate>

          <div class="form-group">
            <label class="form-label" for="loginEmail">Email</label>
            <div class="form-input-wrapper" id="loginEmailWrapper">
              <span class="form-input-icon">✉️</span>
              <input
                type="email"
                id="loginEmail"
                class="neu-input"
                placeholder="you@example.com"
                autocomplete="email"
              />
            </div>
            <div class="form-error" id="loginEmailError">Please enter a valid email.</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <div class="form-input-wrapper" id="loginPasswordWrapper">
              <span class="form-input-icon">🔒</span>
              <input
                type="password"
                id="loginPassword"
                class="neu-input"
                placeholder="••••••••"
                autocomplete="current-password"
              />
            </div>
            <div class="form-error" id="loginPasswordError">Password is required.</div>
          </div>

          <button type="submit" class="auth-submit">Sign In →</button>
        </form>
      </div>

      <!-- Register Panel -->
      <div class="auth-panel" id="panelRegister">
        <form id="registerForm" onsubmit="handleRegister(event)" novalidate>

          <div class="form-group">
            <label class="form-label" for="regName">Full Name</label>
            <div class="form-input-wrapper" id="regNameWrapper">
              <span class="form-input-icon">👤</span>
              <input
                type="text"
                id="regName"
                class="neu-input"
                placeholder="Jane Doe"
                autocomplete="name"
              />
            </div>
            <div class="form-error" id="regNameError">Name is required.</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="regEmail">Email</label>
            <div class="form-input-wrapper" id="regEmailWrapper">
              <span class="form-input-icon">✉️</span>
              <input
                type="email"
                id="regEmail"
                class="neu-input"
                placeholder="you@example.com"
                autocomplete="email"
              />
            </div>
            <div class="form-error" id="regEmailError">Please enter a valid email.</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="regPassword">Password</label>
            <div class="form-input-wrapper" id="regPasswordWrapper">
              <span class="form-input-icon">🔒</span>
              <input
                type="password"
                id="regPassword"
                class="neu-input"
                placeholder="Min. 6 characters"
                autocomplete="new-password"
              />
            </div>
            <div class="form-error" id="regPasswordError">Password must be at least 6 characters.</div>
          </div>

          <button type="submit" class="auth-submit">Create Account →</button>
        </form>
      </div>

    </div><!-- /auth-card -->

  </div><!-- /auth-container -->

  <script>
    // ── Tab switching ──
    function switchTab(tab) {
      const tabs = { login: 'panelLogin', register: 'panelRegister' };
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(tab === 'login' ? 'tabLogin' : 'tabRegister').classList.add('active');
      document.getElementById(tabs[tab]).classList.add('active');
    }

    // ── Validation helpers ──
    function setError(wrapperId, errorId, show) {
      const wrapper = document.getElementById(wrapperId);
      const err = document.getElementById(errorId);
      if (show) {
        wrapper.classList.add('error');
        err.style.display = 'block';
      } else {
        wrapper.classList.remove('error');
        err.style.display = 'none';
      }
      return !show;
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    // ── Login handler ──
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      let valid = true;
      valid = setError('loginEmailWrapper', 'loginEmailError', !email || !isValidEmail(email)) && valid;
      valid = setError('loginPasswordWrapper', 'loginPasswordError', !password) && valid;

      if (!valid) {
        document.getElementById('authCard').classList.add('shake');
        setTimeout(() => document.getElementById('authCard').classList.remove('shake'), 400);
        return;
      }

      // Mock auth — save user info
      const user = { name: email.split('@')[0], email };
      localStorage.setItem('todolander_auth', JSON.stringify(user));
      window.location.href = 'dashboard.html';
    }

    // ── Register handler ──
    function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;

      let valid = true;
      valid = setError('regNameWrapper', 'regNameError', !name) && valid;
      valid = setError('regEmailWrapper', 'regEmailError', !email || !isValidEmail(email)) && valid;
      valid = setError('regPasswordWrapper', 'regPasswordError', password.length < 6) && valid;

      if (!valid) {
        document.getElementById('authCard').classList.add('shake');
        setTimeout(() => document.getElementById('authCard').classList.remove('shake'), 400);
        return;
      }

      const user = { name, email };
      localStorage.setItem('todolander_auth', JSON.stringify(user));
      window.location.href = 'dashboard.html';
    }

    // Clear field errors on input
    document.querySelectorAll('.neu-input').forEach(input => {
      input.addEventListener('input', () => {
        const wrapper = input.closest('.form-input-wrapper');
        if (wrapper) wrapper.classList.remove('error');
      });
    });
  </script>
</body>
</html>
