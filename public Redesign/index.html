<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoLander</title>
  <script>
    // Simple router: redirect based on auth state
    const isLoggedIn = localStorage.getItem('todolander_auth');
    if (isLoggedIn) {
      window.location.href = 'dashboard.html';
    } else {
      window.location.href = 'login.html';
    }
  </script>
</head>
<body></body>
</html>
