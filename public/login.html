<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoLander — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script>(function(){try{var s=JSON.parse(localStorage.getItem('todolander_settings')||'{}');document.documentElement.setAttribute('data-theme',s.theme||'dark');}catch(e){}})();</script>
  <link rel="stylesheet" href="css/neumorphism.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">

  <div class="auth-container">

    <div class="brand">
      <div class="brand-logo">
        <img src="favicon.svg" alt="TodoLander" width="72" height="72">
      </div>
      <div class="brand-name">Todo<span>Lander</span></div>
      <div class="brand-tagline">Your tasks, beautifully organized.</div>
    </div>

    <div class="auth-card neu-card" id="authCard">

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Sign In</button>
        <button class="auth-tab" id="tabRegister">Create Account</button>
      </div>

      <!-- Login Panel -->
      <div class="auth-panel active" id="panelLogin">
        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email</label>
            <div class="form-input-wrapper" id="loginEmailWrapper">
              <span class="form-input-icon">✉️</span>
              <input type="email" id="loginEmail" class="neu-input" placeholder="you@example.com" autocomplete="email" />
            </div>
            <div class="form-error" id="loginEmailError">Please enter a valid email.</div>
          </div>
          <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <div class="form-input-wrapper" id="loginPasswordWrapper">
              <span class="form-input-icon">🔒</span>
              <input type="password" id="loginPassword" class="neu-input" placeholder="••••••••" autocomplete="current-password" />
            </div>
            <div class="form-error" id="loginPasswordError">Password is required.</div>
          </div>
          <div class="form-error" id="loginApiError" style="display:none;margin-bottom:8px;padding-left:0"></div>
          <button type="submit" class="auth-submit" id="loginSubmit">Sign In →</button>
        </form>
      </div>

      <!-- Register Panel -->
      <div class="auth-panel" id="panelRegister">
        <form id="registerForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="regName">Full Name</label>
            <div class="form-input-wrapper" id="regNameWrapper">
              <span class="form-input-icon">👤</span>
              <input type="text" id="regName" class="neu-input" placeholder="Jane Doe" autocomplete="name" />
            </div>
            <div class="form-error" id="regNameError">Name is required.</div>
          </div>
          <div class="form-group">
            <label class="form-label" for="regEmail">Email</label>
            <div class="form-input-wrapper" id="regEmailWrapper">
              <span class="form-input-icon">✉️</span>
              <input type="email" id="regEmail" class="neu-input" placeholder="you@example.com" autocomplete="email" />
            </div>
            <div class="form-error" id="regEmailError">Please enter a valid email.</div>
          </div>
          <div class="form-group">
            <label class="form-label" for="regPassword">Password</label>
            <div class="form-input-wrapper" id="regPasswordWrapper">
              <span class="form-input-icon">🔒</span>
              <input type="password" id="regPassword" class="neu-input" placeholder="Min. 8 characters" autocomplete="new-password" />
            </div>
            <div class="form-error" id="regPasswordError">Password must be at least 8 characters.</div>
          </div>
          <div class="form-error" id="regApiError" style="display:none;margin-bottom:8px;padding-left:0"></div>
          <button type="submit" class="auth-submit" id="regSubmit">Create Account →</button>
        </form>
      </div>

    </div>
  </div>

  <script src="js/login.js" defer></script>
</body>
</html>
