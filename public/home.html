<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222536;
      --border: #2e3247;
      --accent: #6c63ff;
      --accent-hover: #7d75ff;
      --accent-dim: rgba(108, 99, 255, 0.15);
      --text: #e2e4f0;
      --text-muted: #6b7280;
      --text-dim: #9ca3af;
      --danger: #ef4444;
      --danger-dim: rgba(239, 68, 68, 0.15);
      --success: #22c55e;
      --today: #6c63ff;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 28px;
      color: var(--text);
    }

    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      width: 100%;
      max-width: 960px;
    }

    /* ── Calendar ── */
    .calendar-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      height: fit-content;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .cal-header h2 {
      font-size: 1.05rem;
      font-weight: 600;
    }

    .nav-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: var(--accent-dim); border-color: var(--accent); }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 6px;
    }

    .cal-weekdays span {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 4px 0;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      position: relative;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      gap: 2px;
    }

    .cal-day:hover:not(.empty) { background: var(--surface2); border-color: var(--border); }
    .cal-day.empty { cursor: default; }

    .cal-day.today {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 700;
    }

    .cal-day.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .cal-day.selected:hover { background: var(--accent-hover); }

    .cal-day.has-todos .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--success);
    }

    .cal-day.overdue .dot { background: var(--danger); }
    .cal-day.selected .dot { background: rgba(255,255,255,0.7); }
    .cal-day.today:not(.selected) .dot { background: var(--accent); }

    #todayBtn {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      height: 32px;
      background: var(--accent-dim);
      border: 1px solid rgba(108,99,255,0.3);
      color: var(--accent);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #todayBtn:hover { background: var(--accent); color: #fff; }

    /* ── Todo Panel ── */
    .todo-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      min-height: 480px;
    }

    .todo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .todo-header h2 {
      font-size: 1.05rem;
      font-weight: 600;
    }

    .todo-date-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .no-day-msg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Add item form */
    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .add-form input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 9px 12px;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .add-form input::placeholder { color: var(--text-muted); }
    .add-form input:focus { border-color: var(--accent); }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 9px 16px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--accent-hover); }

    .btn-sm {
      padding: 5px 10px;
      font-size: 0.78rem;
      border-radius: 6px;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    .btn-danger {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1px solid transparent;
    }
    .btn-danger:hover { background: var(--danger); color: #fff; }

    /* Todo list */
    .todo-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      transition: border-color 0.15s;
    }
    .todo-item:hover { border-color: #3e4260; }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .todo-checkbox {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .todo-checkbox:hover { border-color: var(--accent); }
    .todo-item.done .todo-checkbox {
      background: var(--success);
      border-color: var(--success);
    }
    .todo-item.done .todo-checkbox::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      display: block;
    }

    .todo-text {
      flex: 1;
      font-size: 0.875rem;
      word-break: break-word;
    }

    .todo-edit-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--accent);
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
      padding: 2px 0;
    }

    .todo-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .todo-item:hover .todo-actions { opacity: 1; }

    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      font-size: 0.8rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    .icon-btn:hover { background: var(--border); color: var(--text); }
    .icon-btn.delete:hover { color: var(--danger); }

    .empty-list {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    /* Stats */
    .stats {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 999px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--success);
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #3e4260; }

    #dayContent {
      display: none;
      flex: 1;
      flex-direction: column;
      min-height: 0;
    }
    #dayContent.visible {
      display: flex;
    }
    #noDayMsg.hidden {
      display: none;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 960px;
      justify-content: flex-end;
    }

    .btn-outline {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-outline:hover { background: var(--surface2); color: var(--text); border-color: #3e4260; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.error { border-color: var(--danger); color: var(--danger); }
    .toast.success { border-color: var(--success); color: var(--success); }

    /* ── Recurring ── */
    .repeat-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-dim);
      padding: 9px 10px;
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }
    .repeat-select:focus { border-color: var(--accent); }
    .repeat-select option { background: var(--surface2); }

    .recur-badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(108,99,255,0.3);
      border-radius: 4px;
      padding: 1px 5px;
      flex-shrink: 0;
      line-height: 1.6;
    }

    .recur-confirm {
      display: flex;
      gap: 5px;
      align-items: center;
      flex-shrink: 0;
    }
    .recur-confirm span {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .btn-recur-day {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 0.72rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-recur-day:hover { background: var(--border); color: var(--text); }
    .btn-recur-all {
      background: var(--danger-dim);
      border: 1px solid transparent;
      color: var(--danger);
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 0.72rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-recur-all:hover { background: var(--danger); color: #fff; }

    @media (max-width: 720px) {
      .app { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>Schedule</h1>
  <div class="toolbar">
    <input type="file" id="importFileInput" accept=".json" style="display:none;" />
    <button class="btn btn-outline btn-sm" id="importBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import JSON
    </button>
    <button class="btn btn-outline btn-sm" id="logoutBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
  <div class="toast" id="toast"></div>
  <div class="app">
    <!-- Calendar -->
    <div class="calendar-card">
      <div class="cal-header">
        <button class="nav-btn" id="prevMonth">&#8249;</button>
        <div style="display:flex;align-items:center;gap:8px;">
          <h2 id="monthLabel"></h2>
          <button id="todayBtn">Today</button>
        </div>
        <button class="nav-btn" id="nextMonth">&#8250;</button>
      </div>
      <div class="cal-weekdays">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span>
        <span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- Todo Panel -->
    <div class="todo-panel" id="todoPanel">
      <div class="no-day-msg" id="noDayMsg">Select a day to view its tasks</div>
      <div class="add-form">
        <input type="text" id="newTaskInput" placeholder="Add a task..." />
        <select id="repeatSelect" class="repeat-select">
          <option value="none">No repeat</option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
        <button class="btn" id="addTaskBtn">Add</button>
      </div>
      <div id="dayContent">
        <div class="todo-header">
          <div>
            <h2 id="panelTitle">Tasks</h2>
            <div class="todo-date-label" id="panelDate"></div>
          </div>
          <button class="btn btn-sm btn-danger" id="clearDoneBtn">Clear done</button>
        </div>
        <div class="todo-list" id="todoList"></div>
        <div class="stats" id="statsBar" style="display:none;">
          <span id="statsText"></span>
          <span id="statsPercent"></span>
        </div>
        <div class="progress-bar" id="progressBarWrap" style="display:none;">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────
    const API_BASE = 'http://localhost:3000';
    const TOKEN_KEY = 'token';

    let state = {
      year: new Date().getFullYear(),
      month: new Date().getMonth(),
      selectedDate: null,
      todos: {},
      recurring: [],
      recurringState: {},
    };

    function getToken() {
      return localStorage.getItem(TOKEN_KEY);
    }

    async function loadFromBackend() {
      const token = getToken();
      if (!token) { window.location.href = './'; return; }

      const res = await fetch(`${API_BASE}/api/user`, {
        headers: { 'Authorization': `Bearer ${token}` },
      });

      if (res.status === 401) {
        localStorage.removeItem(TOKEN_KEY);
        window.location.href = './';
        return;
      }

      const calData = await res.json();
      state.todos         = calData?.todos         || {};
      state.recurring     = calData?.recurring     || [];
      state.recurringState = calData?.recurringState || {};
    }

    async function saveToBackend() {
      const token = getToken();
      if (!token) return;
      try {
        await fetch(`${API_BASE}/api/user`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify({
            todos: state.todos,
            recurring: state.recurring,
            recurringState: state.recurringState,
          }),
        });
      } catch (err) {
        console.error('Failed to save:', err);
      }
    }

    function saveTodos() { saveToBackend(); }
    function saveRecurring() { saveToBackend(); }

    function dateKey(y, m, d) {
      return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    }

    function getTodos(key) {
      return state.todos[key] || [];
    }

    // ── Recurring helpers ───────────────────────────────────
    function doesRecurOn(task, dateStr) {
      const [ty, tm, td] = task.startDate.split('-').map(Number);
      const [dy, dm, dd] = dateStr.split('-').map(Number);
      const start = new Date(ty, tm - 1, td);
      const date  = new Date(dy, dm - 1, dd);
      if (date < start) return false;
      if (task.frequency === 'daily')   return true;
      if (task.frequency === 'weekly')  return start.getDay() === date.getDay();
      if (task.frequency === 'monthly') return td === dd;
      return false;
    }

    function getApplicableRecurring(dateStr) {
      return state.recurring.filter(t => {
        if (!doesRecurOn(t, dateStr)) return false;
        const ds = state.recurringState[dateStr] || {};
        return !ds[t.id]?.dismissed;
      });
    }

    function hasTasks(dateStr) {
      if (getTodos(dateStr).length > 0) return true;
      return state.recurring.some(t => {
        if (!doesRecurOn(t, dateStr)) return false;
        const ds = state.recurringState[dateStr] || {};
        return !ds[t.id]?.dismissed;
      });
    }

    function hasPastIncomplete(dateStr) {
      const [dy, dm, dd] = dateStr.split('-').map(Number);
      const date = new Date(dy, dm - 1, dd);
      const todayMidnight = new Date();
      todayMidnight.setHours(0, 0, 0, 0);
      if (date >= todayMidnight) return false;

      const todos = getTodos(dateStr);
      if (todos.some(t => !t.done)) return true;

      return state.recurring.some(t => {
        if (!doesRecurOn(t, dateStr)) return false;
        const ds = state.recurringState[dateStr] || {};
        if (ds[t.id]?.dismissed) return false;
        return !ds[t.id]?.done;
      });
    }

    // ── Calendar ───────────────────────────────────────────
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

    function renderCalendar() {
      const { year, month, selectedDate } = state;
      document.getElementById('monthLabel').textContent = `${MONTHS[month]} ${year}`;

      const grid = document.getElementById('calGrid');
      grid.innerHTML = '';

      const today = new Date();
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      // blank cells
      for (let i = 0; i < firstDay; i++) {
        const el = document.createElement('div');
        el.className = 'cal-day empty';
        grid.appendChild(el);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const key = dateKey(year, month, d);
        const el = document.createElement('div');
        el.className = 'cal-day';

        const isToday = today.getFullYear() === year &&
                        today.getMonth() === month &&
                        today.getDate() === d;
        const isSelected = selectedDate === key;
        const hasAny = hasTasks(key);

        const isOverdue = !isToday && hasPastIncomplete(key);

        if (isToday)    el.classList.add('today');
        if (isSelected) el.classList.add('selected');
        if (hasAny)     el.classList.add('has-todos');
        if (isOverdue)  el.classList.add('overdue');

        el.innerHTML = `<span>${d}</span>${hasAny ? '<div class="dot"></div>' : ''}`;
        el.addEventListener('click', () => selectDay(key));
        grid.appendChild(el);
      }
    }

    function selectDay(key) {
      state.selectedDate = key;
      renderCalendar();
      renderTodos();
    }

    document.getElementById('prevMonth').addEventListener('click', () => {
      if (state.month === 0) { state.month = 11; state.year--; }
      else state.month--;
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      if (state.month === 11) { state.month = 0; state.year++; }
      else state.month++;
      renderCalendar();
    });

    document.getElementById('todayBtn').addEventListener('click', () => {
      const now = new Date();
      state.year  = now.getFullYear();
      state.month = now.getMonth();
      const key = dateKey(state.year, state.month, now.getDate());
      state.selectedDate = key;
      renderCalendar();
      renderTodos();
    });

    // ── Todo Panel ─────────────────────────────────────────
    function renderTodos() {
      const { selectedDate } = state;
      const noDayMsg = document.getElementById('noDayMsg');
      const dayContent = document.getElementById('dayContent');

      if (!selectedDate) {
        noDayMsg.classList.remove('hidden');
        dayContent.classList.remove('visible');
        return;
      }

      noDayMsg.classList.add('hidden');
      dayContent.classList.add('visible');

      // Header
      const [y, m, d] = selectedDate.split('-').map(Number);
      const dateObj = new Date(y, m - 1, d);
      document.getElementById('panelTitle').textContent = dateObj.toLocaleDateString('en-US', { weekday: 'long' });
      document.getElementById('panelDate').textContent = dateObj.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

      const todos = getTodos(selectedDate);
      const applicable = getApplicableRecurring(selectedDate);
      const list = document.getElementById('todoList');
      list.innerHTML = '';

      if (todos.length === 0 && applicable.length === 0) {
        list.innerHTML = '<div class="empty-list">No tasks yet. Add one above.</div>';
      } else {
        todos.forEach((todo, idx) => list.appendChild(makeTodoEl(todo, idx)));
        applicable.forEach(task => list.appendChild(makeRecurringEl(task, selectedDate)));
      }

      // Stats
      const recurDone = applicable.filter(t => (state.recurringState[selectedDate] || {})[t.id]?.done).length;
      const done  = todos.filter(t => t.done).length + recurDone;
      const total = todos.length + applicable.length;
      const statsBar = document.getElementById('statsBar');
      const progressBarWrap = document.getElementById('progressBarWrap');

      if (total > 0) {
        statsBar.style.display = 'flex';
        progressBarWrap.style.display = 'block';
        document.getElementById('statsText').textContent = `${done} of ${total} complete`;
        const pct = Math.round((done / total) * 100);
        document.getElementById('statsPercent').textContent = `${pct}%`;
        document.getElementById('progressFill').style.width = `${pct}%`;
      } else {
        statsBar.style.display = 'none';
        progressBarWrap.style.display = 'none';
      }
    }

    function makeTodoEl(todo, idx) {
      const item = document.createElement('div');
      item.className = `todo-item${todo.done ? ' done' : ''}`;

      const checkbox = document.createElement('div');
      checkbox.className = 'todo-checkbox';
      checkbox.title = todo.done ? 'Mark undone' : 'Mark done';
      checkbox.addEventListener('click', () => toggleTodo(idx));

      const textEl = document.createElement('span');
      textEl.className = 'todo-text';
      textEl.textContent = todo.text;

      const actions = document.createElement('div');
      actions.className = 'todo-actions';

      const editBtn = document.createElement('button');
      editBtn.className = 'icon-btn edit';
      editBtn.title = 'Edit';
      editBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
      editBtn.addEventListener('click', () => startEdit(idx, item, textEl));

      const delBtn = document.createElement('button');
      delBtn.className = 'icon-btn delete';
      delBtn.title = 'Delete';
      delBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
      delBtn.addEventListener('click', () => deleteTodo(idx));

      actions.appendChild(editBtn);
      actions.appendChild(delBtn);

      item.appendChild(checkbox);
      item.appendChild(textEl);
      item.appendChild(actions);
      return item;
    }

    function startEdit(idx, item, textEl) {
      const todos = getTodos(state.selectedDate);
      const input = document.createElement('input');
      input.className = 'todo-edit-input';
      input.value = todos[idx].text;

      item.replaceChild(input, textEl);
      input.focus();
      input.select();

      const save = () => {
        const val = input.value.trim();
        if (val) {
          todos[idx].text = val;
          state.todos[state.selectedDate] = todos;
          saveTodos();
        }
        renderTodos();
      };

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') save();
        if (e.key === 'Escape') renderTodos();
      });
      input.addEventListener('blur', save);
    }

    function addTodo(text, frequency) {
      const key = state.selectedDate;
      if (!key) return;
      if (frequency && frequency !== 'none') {
        state.recurring.push({ id: String(Date.now()), text, frequency, startDate: key });
        saveRecurring();
      } else {
        if (!state.todos[key]) state.todos[key] = [];
        state.todos[key].push({ text, done: false, id: Date.now() });
        saveTodos();
      }
      renderCalendar();
      renderTodos();
    }

    // ── Recurring task element ──────────────────────────────
    function makeRecurringEl(task, dateStr) {
      const ds    = state.recurringState[dateStr] || {};
      const isDone = ds[task.id]?.done || false;

      const item = document.createElement('div');
      item.className = `todo-item${isDone ? ' done' : ''}`;

      const checkbox = document.createElement('div');
      checkbox.className = 'todo-checkbox';
      checkbox.addEventListener('click', () => toggleRecurring(task.id, dateStr));

      const badge = document.createElement('span');
      badge.className = 'recur-badge';
      badge.textContent = task.frequency === 'daily' ? 'Daily'
                        : task.frequency === 'weekly' ? 'Weekly' : 'Monthly';

      const textEl = document.createElement('span');
      textEl.className = 'todo-text';
      textEl.textContent = task.text;

      const actions = document.createElement('div');
      actions.className = 'todo-actions';

      const editBtn = document.createElement('button');
      editBtn.className = 'icon-btn edit';
      editBtn.title = 'Edit';
      editBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
      editBtn.addEventListener('click', () => startEditRecurring(task.id, item, textEl));

      const delBtn = document.createElement('button');
      delBtn.className = 'icon-btn delete';
      delBtn.title = 'Delete';
      delBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
      delBtn.addEventListener('click', () => showRecurDeleteConfirm(task.id, dateStr, item, actions));

      actions.appendChild(editBtn);
      actions.appendChild(delBtn);

      item.appendChild(checkbox);
      item.appendChild(badge);
      item.appendChild(textEl);
      item.appendChild(actions);
      return item;
    }

    function showRecurDeleteConfirm(id, dateStr, item, actions) {
      const confirm = document.createElement('div');
      confirm.className = 'recur-confirm';

      const label = document.createElement('span');
      label.textContent = 'Remove:';

      const dayBtn = document.createElement('button');
      dayBtn.className = 'btn-recur-day';
      dayBtn.textContent = 'Today only';
      dayBtn.addEventListener('click', () => dismissRecurring(id, dateStr));

      const allBtn = document.createElement('button');
      allBtn.className = 'btn-recur-all';
      allBtn.textContent = 'All occurrences';
      allBtn.addEventListener('click', () => deleteRecurring(id));

      confirm.appendChild(label);
      confirm.appendChild(dayBtn);
      confirm.appendChild(allBtn);

      item.replaceChild(confirm, actions);
      item.style.borderColor = 'var(--danger)';
    }

    function toggleRecurring(id, dateStr) {
      if (!state.recurringState[dateStr]) state.recurringState[dateStr] = {};
      const cur = state.recurringState[dateStr][id] || {};
      state.recurringState[dateStr][id] = { ...cur, done: !cur.done };
      saveRecurring();
      renderTodos();
    }

    function dismissRecurring(id, dateStr) {
      if (!state.recurringState[dateStr]) state.recurringState[dateStr] = {};
      state.recurringState[dateStr][id] = { dismissed: true };
      saveRecurring();
      renderCalendar();
      renderTodos();
    }

    function deleteRecurring(id) {
      state.recurring = state.recurring.filter(t => t.id !== id);
      for (const date of Object.keys(state.recurringState)) {
        delete state.recurringState[date][id];
      }
      saveRecurring();
      renderCalendar();
      renderTodos();
    }

    function startEditRecurring(id, item, textEl) {
      const task = state.recurring.find(t => t.id === id);
      if (!task) return;
      const input = document.createElement('input');
      input.className = 'todo-edit-input';
      input.value = task.text;
      item.replaceChild(input, textEl);
      input.focus();
      input.select();
      const save = () => {
        const val = input.value.trim();
        if (val) { task.text = val; saveRecurring(); }
        renderTodos();
      };
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') save();
        if (e.key === 'Escape') renderTodos();
      });
      input.addEventListener('blur', save);
    }

    function toggleTodo(idx) {
      const key = state.selectedDate;
      state.todos[key][idx].done = !state.todos[key][idx].done;
      saveTodos();
      renderTodos();
    }

    function deleteTodo(idx) {
      const key = state.selectedDate;
      state.todos[key].splice(idx, 1);
      if (state.todos[key].length === 0) delete state.todos[key];
      saveTodos();
      renderCalendar();
      renderTodos();
    }

    // ── Events ─────────────────────────────────────────────
    document.getElementById('addTaskBtn').addEventListener('click', () => {
      const input = document.getElementById('newTaskInput');
      const freq  = document.getElementById('repeatSelect').value;
      const val   = input.value.trim();
      if (val) { addTodo(val, freq); input.value = ''; document.getElementById('repeatSelect').value = 'none'; }
    });

    document.getElementById('newTaskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const val  = e.target.value.trim();
        const freq = document.getElementById('repeatSelect').value;
        if (val) { addTodo(val, freq); e.target.value = ''; document.getElementById('repeatSelect').value = 'none'; }
      }
    });

    document.getElementById('clearDoneBtn').addEventListener('click', () => {
      const key = state.selectedDate;
      if (!key) return;
      // Clear done regular tasks
      state.todos[key] = (state.todos[key] || []).filter(t => !t.done);
      if (state.todos[key].length === 0) delete state.todos[key];
      saveTodos();
      // Dismiss done recurring tasks for this day
      const ds = state.recurringState[key] || {};
      for (const id of Object.keys(ds)) {
        if (ds[id]?.done) ds[id] = { dismissed: true };
      }
      state.recurringState[key] = ds;
      saveRecurring();
      renderCalendar();
      renderTodos();
    });

    // ── Import JSON ────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.classList.remove('show'); }, 3000);
    }

    function importJSON(data) {
      if (typeof data !== 'object' || Array.isArray(data) || data === null) {
        showToast('Invalid format: expected a JSON object.', 'error');
        return;
      }

      const dateRe = /^\d{4}-\d{2}-\d{2}$/;
      let imported = 0;
      let skipped = 0;

      for (const [key, items] of Object.entries(data)) {
        if (!dateRe.test(key)) { skipped++; continue; }
        if (!Array.isArray(items)) { skipped++; continue; }

        const existing = state.todos[key] || [];
        const existingTexts = new Set(existing.map(t => t.text.toLowerCase()));

        for (const item of items) {
          const text = typeof item === 'string' ? item.trim()
                     : typeof item?.text === 'string' ? item.text.trim()
                     : null;
          if (!text) continue;
          if (existingTexts.has(text.toLowerCase())) continue; // skip duplicates
          existing.push({ text, done: false, id: Date.now() + Math.random() });
          existingTexts.add(text.toLowerCase());
          imported++;
        }

        if (existing.length > 0) state.todos[key] = existing;
      }

      if (imported === 0 && skipped === 0) {
        showToast('No tasks found in file.', 'error');
        return;
      }

      saveTodos();
      renderCalendar();
      renderTodos();

      const msg = imported > 0
        ? `Imported ${imported} task${imported !== 1 ? 's' : ''}${skipped ? ` (${skipped} invalid entries skipped)` : ''}.`
        : `Nothing imported — ${skipped} invalid entries skipped.`;
      showToast(msg, imported > 0 ? 'success' : 'error');
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      const token = getToken();
      if (token) {
        await fetch(`${API_BASE}/api/logout`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
        }).catch(() => {});
      }
      localStorage.removeItem(TOKEN_KEY);
      window.location.href = './';
    });

    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('importFileInput').value = '';
      document.getElementById('importFileInput').click();
    });

    document.getElementById('importFileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          importJSON(data);
        } catch {
          showToast('Could not parse file — make sure it is valid JSON.', 'error');
        }
      };
      reader.readAsText(file);
    });

    // ── Init ───────────────────────────────────────────────
    async function init() {
      await loadFromBackend();
      renderCalendar();
      renderTodos();
    }

    init();
  </script>
</body>
</html>
