<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — TodoLander</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TodoLander" />
  <meta name="theme-color" content="#1a1d2e" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Dark theme */
      --bg: #0f1117;
      --surface: #1a1d2e;
      --surface-alt: #252d42;
      --border: #3a4558;
      --accent: #6edf6e;
      --accent-dim: rgba(110, 223, 110, 0.12);
      --accent-hover: #7dff7d;
      --text: #f0f2f5;
      --text-muted: #8b92a2;
      --text-dim: #a8b1c1;
      --danger: #ff6b6b;
      --danger-dim: rgba(255, 107, 107, 0.12);
      --success: #51cf66;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body.light {
      --bg: #fafaf8;
      --surface: #ffffff;
      --surface-alt: #f5f3f0;
      --border: #e8e4e0;
      --accent: #2d7a3d;
      --accent-dim: rgba(45, 122, 61, 0.08);
      --accent-hover: #1f5a2d;
      --text: #1a1d2e;
      --text-muted: #7a8291;
      --text-dim: #5a6270;
      --danger: #d92a2a;
      --danger-dim: rgba(217, 42, 42, 0.08);
    }

    body {
      font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(110, 223, 110, 0.04) 0%, rgba(45, 122, 61, 0.02) 100%);
      pointer-events: none;
      z-index: 0;
    }

    body.light::before {
      background: linear-gradient(135deg, rgba(45, 122, 61, 0.02) 0%, rgba(110, 223, 110, 0.03) 100%);
    }

    /* Decorative elements */
    .accent-line {
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    .accent-line-top {
      top: 60px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.3;
    }

    .accent-circle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.08;
    }

    .accent-circle-1 {
      width: 300px;
      height: 300px;
      top: -100px;
      right: -100px;
      border: 1px solid var(--accent);
    }

    .accent-circle-2 {
      width: 200px;
      height: 200px;
      bottom: 80px;
      left: -60px;
      border: 1px solid var(--accent);
    }

    /* Content layer */
    .brand, .card, .footer-text, .theme-toggle {
      position: relative;
      z-index: 1;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
    }

    .theme-toggle:hover {
      transform: rotate(20deg) scale(1.05);
      border-color: var(--accent);
      background: var(--surface-alt);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      color: var(--text);
      transition: opacity 0.3s;
    }

    .theme-toggle .sun { opacity: 0; position: absolute; }
    .light .theme-toggle .sun { opacity: 1; }
    .light .theme-toggle .moon { opacity: 0; }

    /* ─── Brand ─── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 48px;
      text-align: center;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(110, 223, 110, 0.3); }
      50% { box-shadow: 0 0 0 8px rgba(110, 223, 110, 0); }
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      color: var(--bg);
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
      margin: 0;
    }

    .brand-tagline {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ─── Card ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: clamp(300px, 90vw, 420px);
      min-height: 420px;
      position: relative;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
      animation: slide-up 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 32px;
      right: 32px;
      height: 2px;
      background: var(--accent);
      border-radius: 999px;
    }

    /* ─── Tabs ─── */
    .tabs {
      display: flex;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      gap: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 10px 12px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: inherit;
      position: relative;
    }

    .tab.active {
      background: var(--accent);
      color: var(--bg);
      font-weight: 700;
    }

    .tab:not(.active):hover {
      color: var(--text);
      background: rgba(110, 223, 110, 0.05);
    }

    /* ─── Forms ─── */
    .forms-container {
      position: relative;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      position: absolute;
      top: 0; left: 0; right: 0;
      transition: opacity 0.3s;
    }

    .form.active {
      opacity: 1;
      pointer-events: all;
      position: relative;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--surface-alt);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 11px 14px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input[type="text"]::placeholder,
    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: var(--text-muted);
      font-weight: 400;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .input-wrap input {
      padding-right: 40px;
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .toggle-pw:hover {
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ─── Submit button ─── */
    .submit-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.02em;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.2);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(110, 223, 110, 0.3);
      background: var(--accent-hover);
    }

    .submit-btn:hover::before {
      opacity: 1;
    }

    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(110, 223, 110, 0.2);
    }

    /* ─── Error message ─── */
    .error-msg {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--danger);
      background: var(--danger-dim);
      border: 1px solid rgba(255, 107, 107, 0.2);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      display: none;
      animation: shake 0.3s ease-in-out;
    }

    .error-msg.visible {
      display: block;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0;
    }

    /* ─── Footer ─── */
    .footer-text {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 24px;
    }

    .footer-text a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
      border-bottom: 1px solid transparent;
    }

    .footer-text a:hover {
      border-bottom-color: var(--accent);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }
  </style>
</head>
<body>

  <!-- Decorative elements -->
  <div class="accent-line accent-line-top"></div>
  <div class="accent-circle accent-circle-1"></div>
  <div class="accent-circle accent-circle-2"></div>

  <!-- Theme toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" title="Toggle theme">
    <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>

  <!-- Brand -->
  <div class="brand">
    <div class="logo-container">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h1 class="logo-text">TodoLander</h1>
    </div>
    <p class="brand-tagline">Stay organized, stay grounded</p>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="tabs" role="tablist">
      <button class="tab active" id="signinTab" role="tab" aria-selected="true" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="signupTab" role="tab" aria-selected="false" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="forms-container">
      <!-- Sign In -->
      <form class="form active" id="signinForm" novalidate onsubmit="handleSignin(event)">
        <div class="error-msg" id="signinError"></div>

        <div class="field">
          <label for="signinEmail">Email</label>
          <input type="email" id="signinEmail" placeholder="you@example.com" autocomplete="email" required maxlength="255" />
        </div>

        <div class="field">
          <label for="signinPassword">Password</label>
          <div class="input-wrap">
            <input type="password" id="signinPassword" placeholder="Your password" autocomplete="current-password" required maxlength="128" />
            <button type="button" class="toggle-pw" aria-label="Show password" onclick="togglePassword('signinPassword', this)">
              <svg id="signinEyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <hr class="divider" />

        <button type="submit" class="submit-btn">Sign In</button>
      </form>

      <!-- Sign Up -->
      <form class="form" id="signupForm" novalidate onsubmit="handleSignup(event)">
        <div class="error-msg" id="signupError"></div>

        <div class="field">
          <label for="signupName">Name</label>
          <input type="text" id="signupName" placeholder="Your name" autocomplete="name" required maxlength="100" />
        </div>

        <div class="field">
          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" required maxlength="255" />
        </div>

        <div class="field">
          <label for="signupPassword">Password</label>
          <div class="input-wrap">
            <input type="password" id="signupPassword" placeholder="Create a password" autocomplete="new-password" required maxlength="128" />
            <button type="button" class="toggle-pw" aria-label="Show password" onclick="togglePassword('signupPassword', this)">
              <svg id="signupEyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="signupConfirm">Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="signupConfirm" placeholder="Repeat your password" autocomplete="new-password" required maxlength="128" />
            <button type="button" class="toggle-pw" aria-label="Show password" onclick="togglePassword('signupConfirm', this)">
              <svg id="signupConfirmEyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <hr class="divider" />

        <button type="submit" class="submit-btn">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    // Apply saved theme on load
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light');
    }

    const EYE_OPEN = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const EYE_CLOSED = `<line x1="17.94" y1="17.94" x2="22" y2="22"/><line x1="1" y1="1" x2="5.18" y2="5.18"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M6.18 6.18A18.5 18.5 0 0 0 1 12s4 8 11 8c2.21 0 4.25-.72 5.9-1.95"/><line x1="1" y1="1" x2="22" y2="22"/>`;
    const TOKEN_KEY = 'token';

    // Theme toggle
    document.getElementById('themeToggle').addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const svg = btn.querySelector('svg');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      svg.innerHTML = isHidden ? EYE_CLOSED : EYE_OPEN;
      btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    }

    function switchTab(tab) {
      const isSignin = tab === 'signin';

      document.getElementById('signinTab').classList.toggle('active', isSignin);
      document.getElementById('signupTab').classList.toggle('active', !isSignin);
      document.getElementById('signinTab').setAttribute('aria-selected', isSignin);
      document.getElementById('signupTab').setAttribute('aria-selected', !isSignin);

      document.getElementById('signinForm').classList.toggle('active', isSignin);
      document.getElementById('signupForm').classList.toggle('active', !isSignin);

      // Clear errors when switching
      setError('signinError', '');
      setError('signupError', '');
    }

    function setError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.toggle('visible', !!msg);
    }

    async function handleSignin(e) {
      e.preventDefault();
      const email = document.getElementById('signinEmail').value.trim();
      const password = document.getElementById('signinPassword').value;

      if (!email || !password) {
        setError('signinError', 'Please fill in all fields.');
        return;
      }

      const response = await fetch('https://dailytodo-api.onrender.com/api/login', {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      if (response.ok) {
        const data = await response.json();
        localStorage.setItem('token', data.data.token);
        window.location.href = './home.html';
      } else {
        const data = await response.json();
        setError('signinError', data.error || 'Sign in failed.');
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;

      if (!name || !email || !password || !confirm) {
        setError('signupError', 'Please fill in all fields.');
        return;
      }

      if (password !== confirm) {
        setError('signupError', 'Passwords do not match.');
        return;
      }

      if (password.length < 8) {
        setError('signupError', 'Password must be at least 8 characters.');
        return;
      }

      const response = await fetch('https://dailytodo-api.onrender.com/api/signup', {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password, name })
      });

      if (response.ok) {
        const data = await response.json();
        localStorage.setItem('token', data.data.token);
        window.location.href = './home.html';
      } else {
        const data = await response.json();
        setError('signupError', data.error || 'Sign up failed.');
      }
    }
  </script>
</body>
</html>
