<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — TodoLander</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222536;
      --border: #2e3247;
      --accent: #6c63ff;
      --accent-hover: #7d75ff;
      --accent-dim: rgba(108, 99, 255, 0.15);
      --text: #e2e4f0;
      --text-muted: #6b7280;
      --text-dim: #9ca3af;
      --danger: #ef4444;
      --danger-dim: rgba(239, 68, 68, 0.15);
      --success: #22c55e;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body.light {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --surface2: #eef0f8;
      --border: #dde0f0;
      --text: #1a1d27;
      --text-muted: #6b7280;
      --text-dim: #4b5563;
      --accent-dim: rgba(108, 99, 255, 0.1);
      --danger-dim: rgba(239, 68, 68, 0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-text {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text);
    }
    .logo-accent { color: var(--accent); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: clamp(300px, 90vw, 420px);
      /* fixed height so switching tabs never resizes the card */
      min-height: 420px;
      position: relative;
    }

    /* Tab switcher */
    .tabs {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      gap: 4px;
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    .tab:not(.active):hover {
      background: var(--border);
      color: var(--text-dim);
    }

    /* Forms — both occupy the same space so the card never resizes */
    .forms-container {
      position: relative;
    }
    .form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      transition: opacity 0.15s;
    }
    .form.active {
      opacity: 1;
      pointer-events: all;
      position: relative;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]::placeholder,
    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: var(--text-muted);
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
    }

    .input-wrap input {
      padding-right: 40px;
    }

    .toggle-pw {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .toggle-pw:hover { color: var(--text); }

    .submit-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 11px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    .submit-btn:hover { background: var(--accent-hover); }

    .error-msg {
      font-size: 0.8rem;
      color: var(--danger);
      background: var(--danger-dim);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      display: none;
    }

    .error-msg.visible { display: block; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0;
    }

    .footer-text {
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 20px;
    }

    .footer-text a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-text a:hover { text-decoration: underline; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  </style>
</head>
<body>

  <div class="brand">
    <svg width="86" height="86" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="30" height="30" rx="8" fill="#6c63ff"/>
      <polyline points="8,15 12,20 22,10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <span class="logo-text"><span class="logo-accent">Todo</span>Lander</span>
  </div>

  <div class="card">
    <div class="tabs" role="tablist">
      <button class="tab active" id="signinTab" role="tab" aria-selected="true" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="signupTab" role="tab" aria-selected="false" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="forms-container">
    <!-- Sign In -->
    <form class="form active" id="signinForm" novalidate onsubmit="handleSignin(event)">
      <div class="error-msg" id="signinError"></div>

      <div class="field">
        <label for="signinEmail">Email</label>
        <input type="email" id="signinEmail" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="signinPassword">Password</label>
        <div class="input-wrap">
          <input type="password" id="signinPassword" placeholder="Your password" autocomplete="current-password" required />
          <button type="button" class="toggle-pw" aria-label="Show password" onclick="togglePassword('signinPassword', this)">
            <svg id="signinEyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <hr class="divider" />

      <button type="submit" class="submit-btn">Sign In</button>
    </form>

    <!-- Sign Up -->
    <form class="form" id="signupForm" novalidate onsubmit="handleSignup(event)">
      <div class="error-msg" id="signupError"></div>

      <div class="field">
        <label for="signupName">Name</label>
        <input type="text" id="signupName" placeholder="Your name" autocomplete="name" required />
      </div>

      <div class="field">
        <label for="signupEmail">Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="signupPassword">Password</label>
        <div class="input-wrap">
          <input type="password" id="signupPassword" placeholder="Create a password" autocomplete="new-password" required />
          <button type="button" class="toggle-pw" aria-label="Show password" onclick="togglePassword('signupPassword', this)">
            <svg id="signupEyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="signupConfirm">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="signupConfirm" placeholder="Repeat your password" autocomplete="new-password" required />
          <button type="button" class="toggle-pw" aria-label="Show password" onclick="togglePassword('signupConfirm', this)">
            <svg id="signupConfirmEyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <hr class="divider" />

      <button type="submit" class="submit-btn">Create Account</button>
    </form>
    </div><!-- end forms-container -->
  </div>


  <script>
    // Apply saved theme on load
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

    const EYE_OPEN = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const EYE_CLOSED = `<line x1="17.94" y1="17.94" x2="22" y2="22"/><line x1="1" y1="1" x2="5.18" y2="5.18"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M6.18 6.18A18.5 18.5 0 0 0 1 12s4 8 11 8c2.21 0 4.25-.72 5.9-1.95"/><line x1="1" y1="1" x2="22" y2="22"/>`;
    const TOKEN_KEY = 'token';

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const svg = btn.querySelector('svg');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      svg.innerHTML = isHidden ? EYE_CLOSED : EYE_OPEN;
      btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    }

    function switchTab(tab) {
      const isSignin = tab === 'signin';

      document.getElementById('signinTab').classList.toggle('active', isSignin);
      document.getElementById('signupTab').classList.toggle('active', !isSignin);
      document.getElementById('signinTab').setAttribute('aria-selected', isSignin);
      document.getElementById('signupTab').setAttribute('aria-selected', !isSignin);

      document.getElementById('signinForm').classList.toggle('active', isSignin);
      document.getElementById('signupForm').classList.toggle('active', !isSignin);

      // Clear errors when switching
      setError('signinError', '');
      setError('signupError', '');
    }

    function setError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.toggle('visible', !!msg);
    }

    async function handleSignin(e) {
      e.preventDefault();
      const email = document.getElementById('signinEmail').value.trim();
      const password = document.getElementById('signinPassword').value;

      if (!email || !password) {
        setError('signinError', 'Please fill in all fields.');
        return;
      }

      // TODO: wire up to /api/auth/login

      const response = await fetch('https://dailytodo-api.onrender.com/api/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      if (response.ok) {
        const data = await response.json();
        localStorage.setItem('token', data.data.token);
        window.location.href = './home.html';
      } else {
        const data = await response.json();
        setError('signinError', data.error || 'Sign in failed.');
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;

      if (!name || !email || !password || !confirm) {
        setError('signupError', 'Please fill in all fields.');
        return;
      }

      if (password !== confirm) {
        setError('signupError', 'Passwords do not match.');
        return;
      }

      if (password.length < 8) {
        setError('signupError', 'Password must be at least 8 characters.');
        return;
      }

      // TODO: wire up to /api/auth/signup
      const response = await fetch('https://dailytodo-api.onrender.com/api/signup', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password, name })
      });

      if (response.ok) {
        const data = await response.json();
        localStorage.setItem('token', data.data.token);
        window.location.href = './home.html';
      } else {
        const data = await response.json();
        setError('signupError', data.error || 'Sign up failed.');
      }
    }
  </script>
</body>
</html>
