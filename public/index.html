<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — TodoLander</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TodoLander" />
  <meta name="theme-color" content="#0c0e1a" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0e1a;
      --surface: #13162a;
      --surface2: #1b1f38;
      --border: #252a47;
      --accent: #6c63ff;
      --accent-hover: #7d75ff;
      --accent-dim: rgba(108, 99, 255, 0.18);
      --text: #e8eaf6;
      --text-muted: #6b7280;
      --text-dim: #9ca3af;
      --danger: #ef4444;
      --danger-dim: rgba(239, 68, 68, 0.15);
      --success: #22c55e;
      --radius: 16px;
      --radius-sm: 10px;
    }

    body.light {
      --bg: #f0f1ff;
      --surface: #ffffff;
      --surface2: #eef0fb;
      --border: #dde0f4;
      --text: #1a1d3a;
      --text-muted: #6b7280;
      --text-dim: #4b5563;
      --accent-dim: rgba(108, 99, 255, 0.1);
      --danger-dim: rgba(239, 68, 68, 0.1);
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow: hidden;
    }

    /* Dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }
    body.light::before {
      background-image: radial-gradient(circle, rgba(80,80,160,0.07) 1px, transparent 1px);
    }

    /* Floating color orbs */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(90px);
      z-index: 0;
    }
    .bg-orb-1 {
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(108,99,255,0.35) 0%, transparent 70%);
      top: -160px;
      left: -160px;
      animation: orbFloat1 14s ease-in-out infinite;
    }
    .bg-orb-2 {
      width: 380px;
      height: 380px;
      background: radial-gradient(circle, rgba(56,189,248,0.2) 0%, transparent 70%);
      bottom: -100px;
      right: -100px;
      animation: orbFloat2 18s ease-in-out infinite;
    }
    .bg-orb-3 {
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(244,114,182,0.18) 0%, transparent 70%);
      bottom: 28%;
      left: 8%;
      animation: orbFloat3 11s ease-in-out infinite;
    }

    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0); }
      33%       { transform: translate(28px, 22px); }
      66%       { transform: translate(-12px, 34px); }
    }
    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(-22px, -18px); }
    }
    @keyframes orbFloat3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(14px, -10px) scale(1.12); }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-orb { animation: none; }
    }

    /* Content layer above bg */
    .brand, .card, .footer-text { position: relative; z-index: 1; }

    /* ─── Brand ─── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-bottom: 28px;
      text-align: center;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .logo-text {
      font-size: clamp(1.9rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -1.5px;
      color: var(--text);
      line-height: 1;
    }

    .logo-accent {
      background: linear-gradient(135deg, #7c6ef0 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-tagline {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-top: 7px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ─── Card ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: clamp(300px, 90vw, 420px);
      min-height: 420px;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(108,99,255,0.08),
        0 24px 64px rgba(0,0,0,0.45),
        0 0 90px rgba(108,99,255,0.07);
    }

    /* Gradient accent stripe at top of card */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 24px;
      right: 24px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #6c63ff 30%, #a78bfa 70%, transparent);
      border-radius: 0 0 4px 4px;
    }

    /* ─── Tabs ─── */
    .tabs {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      gap: 4px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 9px;
      background: transparent;
      border: none;
      border-radius: 7px;
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 14px rgba(108,99,255,0.45);
    }

    .tab:not(.active):hover {
      background: var(--border);
      color: var(--text-dim);
    }

    /* ─── Forms ─── */
    .forms-container { position: relative; }

    .form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      opacity: 0;
      pointer-events: none;
      position: absolute;
      top: 0; left: 0; right: 0;
      transition: opacity 0.2s;
    }
    .form.active {
      opacity: 1;
      pointer-events: all;
      position: relative;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }

    label {
      font-size: 0.73rem;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 13px;
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]::placeholder,
    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: var(--text-muted);
      font-weight: 400;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .input-wrap input { padding-right: 40px; }

    .toggle-pw {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .toggle-pw:hover { color: var(--text); }

    /* ─── Submit button ─── */
    .submit-btn {
      background: linear-gradient(135deg, #6c63ff 0%, #8578ff 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.02em;
      cursor: pointer;
      margin-top: 4px;
      box-shadow: 0 4px 18px rgba(108,99,255,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(108,99,255,0.5);
    }
    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(108,99,255,0.3);
    }

    /* ─── Error message ─── */
    .error-msg {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--danger);
      background: var(--danger-dim);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      display: none;
    }
    .error-msg.visible { display: block; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2px 0;
    }

    /* ─── Footer ─── */
    .footer-text {
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 20px;
    }
    .footer-text a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .footer-text a:hover { text-decoration: underline; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  </style>
</head>
<body>

  <!-- Background decorations -->
  <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-2" aria-hidden="true"></div>
  <div class="bg-orb bg-orb-3" aria-hidden="true"></div>

  <div class="brand">
    <div class="brand-row">
      <svg width="38" height="38" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="30" y2="30" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#7c6ef0"/>
            <stop offset="100%" stop-color="#5a52d5"/>
          </linearGradient>
        </defs>
        <rect width="30" height="30" rx="8" fill="url(#logoGrad)"/>
        <polyline points="8,15 12,20 22,10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="logo-text"><span class="logo-accent">Todo</span>Lander</span>
    </div>
    <p class="brand-tagline">Everyday Todos</p>
  </div>

  <div class="card">
    <div class="tabs" role="tablist">
      <button class="tab active" id="signinTab" role="tab" aria-selected="true" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="signupTab" role="tab" aria-selected="false" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="forms-container">
    <!-- Sign In -->
    <form class="form active" id="signinForm" novalidate onsubmit="handleSignin(event)">
      <div class="error-msg" id="signinError"></div>

      <div class="field">
        <label for="signinEmail">Email</label>
        <input type="email" id="signinEmail" placeholder="you@example.com" autocomplete="email" required maxlength="255" />
      </div>

      <div class="field">
        <label for="signinPassword">Password</label>
        <div class="input-wrap">
          <input type="password" id="signinPassword" placeholder="Your password" autocomplete="current-password" required maxlength="128" />
          <button type="button" class="toggle-pw" aria-label="Show password" onclick="togglePassword('signinPassword', this)">
            <svg id="signinEyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <hr class="divider" />

      <button type="submit" class="submit-btn">Sign In</button>
    </form>

    <!-- Sign Up -->
    <form class="form" id="signupForm" novalidate onsubmit="handleSignup(event)">
      <div class="error-msg" id="signupError"></div>

      <div class="field">
        <label for="signupName">Name</label>
        <input type="text" id="signupName" placeholder="Your name" autocomplete="name" required maxlength="100" />
      </div>

      <div class="field">
        <label for="signupEmail">Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" required maxlength="255" />
      </div>

      <div class="field">
        <label for="signupPassword">Password</label>
        <div class="input-wrap">
          <input type="password" id="signupPassword" placeholder="Create a password" autocomplete="new-password" required maxlength="128" />
          <button type="button" class="toggle-pw" aria-label="Show password" onclick="togglePassword('signupPassword', this)">
            <svg id="signupEyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="signupConfirm">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="signupConfirm" placeholder="Repeat your password" autocomplete="new-password" required maxlength="128" />
          <button type="button" class="toggle-pw" aria-label="Show password" onclick="togglePassword('signupConfirm', this)">
            <svg id="signupConfirmEyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <hr class="divider" />

      <button type="submit" class="submit-btn">Create Account</button>
    </form>
    </div><!-- end forms-container -->
  </div>


  <script>
    // Apply saved theme on load
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

    const EYE_OPEN = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const EYE_CLOSED = `<line x1="17.94" y1="17.94" x2="22" y2="22"/><line x1="1" y1="1" x2="5.18" y2="5.18"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M6.18 6.18A18.5 18.5 0 0 0 1 12s4 8 11 8c2.21 0 4.25-.72 5.9-1.95"/><line x1="1" y1="1" x2="22" y2="22"/>`;
    const TOKEN_KEY = 'token';

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const svg = btn.querySelector('svg');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      svg.innerHTML = isHidden ? EYE_CLOSED : EYE_OPEN;
      btn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    }

    function switchTab(tab) {
      const isSignin = tab === 'signin';

      document.getElementById('signinTab').classList.toggle('active', isSignin);
      document.getElementById('signupTab').classList.toggle('active', !isSignin);
      document.getElementById('signinTab').setAttribute('aria-selected', isSignin);
      document.getElementById('signupTab').setAttribute('aria-selected', !isSignin);

      document.getElementById('signinForm').classList.toggle('active', isSignin);
      document.getElementById('signupForm').classList.toggle('active', !isSignin);

      // Clear errors when switching
      setError('signinError', '');
      setError('signupError', '');
    }

    function setError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.toggle('visible', !!msg);
    }

    async function handleSignin(e) {
      e.preventDefault();
      const email = document.getElementById('signinEmail').value.trim();
      const password = document.getElementById('signinPassword').value;

      if (!email || !password) {
        setError('signinError', 'Please fill in all fields.');
        return;
      }

      // TODO: wire up to /api/auth/login

      const response = await fetch('https://dailytodo-api.onrender.com/api/login', {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      if (response.ok) {
        const data = await response.json();
        localStorage.setItem('token', data.data.token);
        window.location.href = './home.html';
      } else {
        const data = await response.json();
        setError('signinError', data.error || 'Sign in failed.');
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;

      if (!name || !email || !password || !confirm) {
        setError('signupError', 'Please fill in all fields.');
        return;
      }

      if (password !== confirm) {
        setError('signupError', 'Passwords do not match.');
        return;
      }

      if (password.length < 8) {
        setError('signupError', 'Password must be at least 8 characters.');
        return;
      }

      // TODO: wire up to /api/auth/signup
      const response = await fetch('https://dailytodo-api.onrender.com/api/signup', {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password, name })
      });

      if (response.ok) {
        const data = await response.json();
        localStorage.setItem('token', data.data.token);
        window.location.href = './home.html';
      } else {
        const data = await response.json();
        setError('signupError', data.error || 'Sign up failed.');
      }
    }
  </script>
</body>
</html>
